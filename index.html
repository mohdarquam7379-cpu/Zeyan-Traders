<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Basic -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Zeyan Traders | Premium Cosmetics & Salon Products</title>

    <meta name="description"
        content="Zeyan Traders - Wholesale Cosmetics, Beauty, Salon, Hair Care & Professional Products.">

    <meta name="keywords"
        content="Cosmetics, Salon, Beauty, Wholesale, Hair Care, Makeup, Zeyan Traders">

    <meta name="author" content="Mohammad Arquam">

    <!-- Theme -->
    <meta name="theme-color" content="#000000">

    <!-- Open Graph -->
    <meta property="og:title" content="Zeyan Traders">

    <meta property="og:description"
        content="Premium Wholesale Cosmetics & Salon Products">

    <meta property="og:type" content="website">

    <meta property="og:image" content="assets/hero.jpg">

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ===================== -->
    <!-- Loading Screen -->
    <!-- ===================== -->

    <div id="loader">

        <div class="loader-logo">

            <img src="assets/logo.png" alt="Zeyan Traders Logo">

        </div>

        <div class="loader-text">

            Zeyan Traders

        </div>

    </div>

    <!-- Scroll Progress -->

    <div id="progress-bar"></div>

    <!-- ===================== -->
    <!-- Header -->
    <!-- ===================== -->

    <header>

        <nav class="navbar">

            <a href="#" class="logo">

                <img src="assets/logo.png" alt="Logo">

                <span>Zeyan Traders</span>

            </a>

            <ul class="nav-links">

                <li><a href="#home">Home</a></li>

                <li><a href="#categories">Categories</a></li>

                <li><a href="#brands">Brands</a></li>

                <li><a href="#gallery">Gallery</a></li>

                <li><a href="#about">About</a></li>

                <li><a href="#contact">Contact</a></li>

            </ul>

            <div class="nav-actions">

                <button id="theme-toggle">

                    <i class="fa-solid fa-moon"></i>

                </button>

                <button id="menu-btn">

                    <i class="fa-solid fa-bars"></i>

                </button>

            </div>

        </nav>

    </header>

    <!-- ===================== -->
    <!-- Hero -->
    <!-- ===================== -->

    <section id="home" class="hero">

        <div class="hero-overlay"></div>

        <div class="hero-content">

            <h1>

                Premium Cosmetics &
                Salon Products

            </h1>

            <p>

                Your Trusted Wholesale Partner
                for Beauty, Cosmetics and
                Professional Salon Supplies.

            </p>

            <div class="hero-buttons">

                <a href="#categories" class="btn gold">

                    Explore Products

                </a>

                <a href="#contact" class="btn glass">

                    Contact Us

                </a>

            </div>

        </div>

    </section>
